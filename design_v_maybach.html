document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 <div style=\"font-family:'Cormorant',serif;font-size:46px;color:#D6BC8A;line-height:1\">1000+<\u002Fdiv>\n          <div style=\"margin-top:10px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8A8578;line-height:1.8\">выпускников<br>сообщества<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;border-right:1px solid rgba(201,169,106,.14);padding:0 24px\">\n          <div style=\"font-family:'Cormorant',serif;font-size:46px;color:#D6BC8A;line-height:1\">HISTES<\u002Fdiv>\n          <div style=\"margin-top:10px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8A8578;line-height:1.8\">единственная в СНГ<br>сертификация<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;padding:0 24px\">\n          <div style=\"font-family:'Cormorant',serif;font-size:46px;color:#D6BC8A;line-height:1\">24/7<\u002Fdiv>\n          <div style=\"margin-top:10px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8A8578;line-height:1.8\">торговые боты<br>Atlas<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- РОАДМАП -->\n  <section data-screen-label=\"Роадмап\" id=\"roadmap\" style=\"position:relative;padding:110px 48px;background:#0C0C10;overflow:hidden\">\n    <svg viewBox=\"0 0 1920 600\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:0;width:100%;height:100%;pointer-events:none;animation:lineSway 12s ease-in-out infinite\">\n      <path d=\"M-40,80 C520,30 1100,120 1960,60\" fill=\"none\" stroke=\"url(#amb2)\" stroke-width=\"1\"><\u002Fpath>\n      <path d=\"M-40,540 C600,600 1260,480 1960,560\" fill=\"none\" stroke=\"url(#amb1)\" stroke-width=\"1\" style=\"animation:ambientPulse 8s ease-in-out infinite\"><\u002Fpath>\n    <\u002Fsvg>\n    <div style=\"position:relative;max-width:1120px;margin:0 auto\">\n      <div style=\"display:flex;align-items:center;gap:22px;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#C >\n          <div style=\"display:grid;grid-template-columns:64px 1fr;gap:0 28px;padding:28px 0;border-bottom:1px solid rgba(201,169,106,.14)\">\n            <div style=\"font-family:'Cormorant',serif;font-size:40px;color:#D6BC8A;line-height:1\">01<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px\"><div style=\"font-size:14px;letter-spacing:.14em;text-transform:uppercase;font-weight:600\">Отвечаешь на вопросы<\u002Fdiv><div style=\"font-size:14px;line-height:1.7;color:#8A8578;font-weight:300\">5 простых вопросов, 3 минуты, бесплатно.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:64px 1fr;gap:0 28px;padding:28px 0;border-bottom:1px solid rgba(201,169,106,.14)\">\n            <div style=\"font-family:'Cormorant',serif;font-size:40px;color:#D6BC8A;line-height:1\">02<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px\"><div style=\"font-size:14px;letter-spacing:.14em;text-transform:uppercase;font-weight:600\">Узнаёшь свой уровень<\u002Fdiv><div style=\"font-size:14px;line-height:1.7;color:#8A8578;font-weight:300\">Система определяет уровень твоей подготовки.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:64px 1fr;gap:0 28px;padding:28px 0;border-bottom:1px solid rgba(201,169,106,.14)\">\n            <div style=\"font-family:'Cormorant',serif;font-size:40px;color:#D6BC8A;line-height:1\">03<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px\"><div style=\"font-size:14px;letter-spacing:.14em;text-transform:uppercase;font-weight:600\">Получаешь роадмап<\u002Fdiv><div style=\"font-size:14px;line-height:1.7;color:#8A8578;font-weight:300\">Персональный план: книги, видео и курсы — в правильном порядке.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:64px 1fr;gap:0 28px;padding:28px 0\">\n            <div style=\"font-family:'Cormorant',serif;font-size:40px;color:#D6BC8A;line-height:1\">04<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px\"><div style=\"font-size:14px;letter-spacing:.14em;text-transform:uppercase;font-weight:600\">Приходишь к результату<\u002Fdiv><div style=\"font-size:14px;line-height:1.7;color:#8A8578;font-weight:300\">Двигаешься по роадмапу в своём темпе, шаг за шагом.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- УНИВЕРСИТЕТ -->\n  <section data-screen-label=\"Университет\" id=\"university\" style=\"position:relative;padding:120px 48px;overflow:hidden\">\n    <svg viewBox=\"0 0 1920 400\" preserveAspectRatio=\"none\" style=\"position:absolute;top:0;left:0;width:100%;height:400px;pointer-events:none;animation:lineSway2 10s ease-in-out infinite\">\n      <path d=\"M-40,90 C480,40 1040,130 1960,70\" fill=\"none\" stroke=\"url(#amb1)\" stroke-width=\"1\" style=\"animation:ambientPulse 10s ease-in-out infinite\"><\u002Fpath>\n      <path d=\"M-40,120 C520,74 1080,166 1960,104\" fill=\"none\" stroke=\"url(#amb2)\" stroke-width=\".8\"><\u002Fpath>\n    <\u002Fsvg>\n    <div style=\"position:relative;max-width:1120px;margin:0 auto;display:flex;flex-direction:column;gap:64px\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:60px;flex-wrap:wrap\">\n        <div style=\"display:flex;flex-direction:column;gap:22px;max-width:620px\">\n          <div style=\"display:flex;align-items:center;gap:22px;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#C9A96A\">\n            <span style=\"width:56px;height:1px;background:linear-gradient(90deg,transparent,#C9A96A)\"><\u002Fspan>\n            Обучение\n          <\u002Fdiv>\n          <h2 style=\"margin:0;font-family:'Cormorant',serif;font-weight:500;font-size:52px;line-height:1.12\">NZT University<\u002Fh2>\n          <p style=\"margin:0;font-size:16px;line-height:1.8;color:#A8A498;font-weight:300\">Сертифицированные программы от новичка до профессионала. Бесплатный старт, групповые потоки и личное наставничество.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid rgba(201,169,106,.3);padding:30px 34px;display:flex;flex-direction:column;gap:10px;max-width:360px;background:rgba(201,169,106,.05)\">\n          <div style=\"font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:#C9A96A\">Европейская аккредитация HISTES<\u002Fdiv>\n          <div style=\"font-size:14px;line-height:1.7;color:#B9B5AA;font-weight:300\">Единственная в СНГ. Диплом европейского образца, признанная квалификация.<\u002Fdiv>\n          <a href=\"#\" style=\"margin-top:6px;color:#D6BC8A;text-decoration:none;font-size:12px;letter-spacing:.18em;text-transform:uppercase\" style-hover=\"color:#EDEAE3\">Посмотреть документы →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(201,169,106,.14);border:1px solid rgba(201,169,106,.14)\">\n        <sc-for list=\"{{ programs }}\" as=\"p\" hint-placeholder-count=\"6\">\n          <div style=\"background:#08080A;padding:38px 34px;display:flex;flex-direction:column;gap:16px;min-height:280px;transition:background .5s ease,box-shadow .5s ease\" style-hover=\"background:#13100A;box-shadow:inset 0 0 120px rgba(201,169,106,.26),inset 0 1px 0 rgba(232,208,160,.7),inset 0 -1px 0 rgba(201,169,106,.35)\">\n            <div style=\"font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:{{ p.statusColor }}\">{{ p.status }}<\u002Fdiv>\n            <div style=\"font-family:'Cormorant',serif;font-size:29px;font-weight:500;line-height:1.2;color:#EDEAE3\">{{ p.title }}<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.7;color:#8A8578;font-weight:300;flex:1\">{{ p.desc }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:14px;border-top:1px solid rgba(201,169,106,.14);padding-top:18px\">\n              <span style=\"font-family:'Cormorant',serif;font-size:23px;color:#D6BC8A\">{{ p.price }}<\u002Fspan>\n              <a href=\"#\" style=\"color:#D6BC8A;text-decoration:none;font-size:11px;letter-spacing:.2em;text-transform:uppercase;border:1px solid rgba(201,169,106,.4);transition:all .45s ease;padding:10px 18px\" style-hover=\"border-color:#D6BC8A;color:#F5EFE2;background:rgba(201,169,106,.12);box-shadow:0 0 26px rgba(201,169,106,.28),inset 0 0 20px rgba(201,169,106,.18)\">{{ p.cta }}<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ATLAS -->\n  <section data-screen-label=\"Atlas\" id=\"tools\" style=\"position:relative;padding:120px 48px;background:#0C0C10;overflow:hidden\">\n    <svg viewBox=\"0 0 1920 620\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:0;width:100%;height:100%;pointer-events:none;animation:lineSway 12s ease-in-out infinite\">\n      <path d=\"M-40,110 C560,50 1180,160 1960,90\" fill=\"none\" stroke=\"url(#amb1)\" stroke-width=\"1.2\" style=\"animation:ambientPulse 7s ease-in-out infinite\"><\u002Fpath>\n      <path d=\"M-40,150 C600,96 1220,204 1960,132\" fill=\"none\" stroke=\"url(#amb2)\" stroke-width=\".8\"><\u002Fpath>\n      <path d=\"M-40,540 C520,610 1200,470 1960,560\" fill=\"none\" stroke=\"url(#amb2)\" stroke-width=\"1\"><\u002Fpath>\n    <\u002Fsvg>\n    <div style=\"position:relative;max-width:1120px;margin:0 auto;display:flex;flex-direction:column;gap:60px;text-align:center;align-items:center\">\n      <div style=\"display:flex;flex-direction:column;gap:24px;align-items:center;max-width:820px\">\n        <div style=\"display:flex;align-items:center;gap:22px;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#C9A96A\">\n          <span style=\"width:56px;height:1px;background:linear-gradient(90deg,transparent,#C9A96A)\"><\u002Fspan>\n
